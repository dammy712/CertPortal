version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: certportal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: certportal_dev
      POSTGRES_USER: certuser
      POSTGRES_PASSWORD: certpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certuser -d certportal_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: certportal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: certportal_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://certuser:certpassword@postgres:5432/certportal_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
      - backend_uploads:/app/uploads
    command: npm run dev

  # ── Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: certportal_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
